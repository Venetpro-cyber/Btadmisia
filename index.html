<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact BTP Admis IA</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:400px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0066ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0052cc;
}
</style>
</head>
<body>

<div class="container">
    <h2>Demande de devis IA</h2>

    <form action="https://formspree.io/f/mjgqbjwr" method="POST">

        <input
            type="text"
            name="nom"
            placeholder="Votre nom"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Votre email"
            required
        >

        <input
            type="tel"
            name="telephone"
            placeholder="Votre téléphone"
        >

        <textarea
            name="message"
            rows="5"
            placeholder="Expliquez votre besoin..."
            required
        ></textarea>

        <button type="submit">
            Envoyer
        </button>

    </form>
</div>

</body>
</html>
